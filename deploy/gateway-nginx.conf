server {
  listen 80;
  server_name stest.saydian.cn;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://stest.saydian.cn$request_uri;
  }
}

server {
  listen 80 default_server;
  server_name _;

  location = /health {
    proxy_pass http://ops-api:3210/health;
  }

  location / {
    return 302 https://stest.saydian.cn$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name stest.saydian.cn;
  client_max_body_size 210m;
  resolver 127.0.0.11 ipv6=off valid=30s;

  ssl_certificate /etc/letsencrypt/live/stest.saydian.cn/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/stest.saydian.cn/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  set $mall_api http://mall-api:3200;
  set $mall_web http://mall-web:80;

  location = /health {
    proxy_pass http://ops-api:3210/health;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /api/saidian-mall/ {
    proxy_pass $mall_api;
    proxy_http_version 1.1;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /api/ {
    proxy_pass http://ops-api:3210;
    proxy_http_version 1.1;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /ops/ {
    proxy_pass http://ops-admin/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /saidian-ops/ {
    proxy_pass http://ops-admin/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /assets/ {
    proxy_pass http://ops-admin/assets/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /saidian-mall/ {
    proxy_pass $mall_web;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /saidian-mall-admin/ {
    proxy_pass $mall_web;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    return 302 /saidian-mall/;
  }
}
