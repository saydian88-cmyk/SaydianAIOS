name: test-build-deploy-production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  images:
    needs: verify
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/saydianaios/ops-api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/saydianaios/ops-api:latest
          cache-from: type=gha,scope=ops-api
          cache-to: type=gha,mode=max,scope=ops-api
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.admin
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/saydianaios/ops-admin:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/saydianaios/ops-admin:latest
          cache-from: type=gha,scope=ops-admin
          cache-to: type=gha,mode=max,scope=ops-admin

  deploy:
    needs: images
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure SSH
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.TENCENT_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.TENCENT_PORT || '22' }}" "${{ secrets.TENCENT_HOST }}" >> ~/.ssh/known_hosts
      - name: Upload deployment files
        shell: bash
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          mkdir -p release-images
          docker pull "ghcr.io/${{ github.repository_owner }}/saydianaios/ops-api:${{ github.sha }}"
          docker pull "ghcr.io/${{ github.repository_owner }}/saydianaios/ops-admin:${{ github.sha }}"
          docker save \
            "ghcr.io/${{ github.repository_owner }}/saydianaios/ops-api:${{ github.sha }}" \
            "ghcr.io/${{ github.repository_owner }}/saydianaios/ops-admin:${{ github.sha }}" \
            | gzip -1 > release-images/saydian-ops-images.tar.gz
          curl -fsSL -o /tmp/ossutil.zip https://gosspublic.alicdn.com/ossutil/v2/2.3.0/ossutil-2.3.0-linux-amd64.zip
          echo "3ae4d9fc85a7a6e9f5654d1599766f1a3a42a3692870887b5ae9338d582ef65a  /tmp/ossutil.zip" | sha256sum -c -
          unzip -q /tmp/ossutil.zip -d /tmp/ossutil
          ossutil_bin="$(find /tmp/ossutil -type f -name ossutil -print -quit)"
          "$ossutil_bin" cp release-images/saydian-ops-images.tar.gz \
            "oss://saidian-brand-assets-prod-sz/system-deploy/saydian-ai-os/${{ github.sha }}/saydian-ops-images.tar.gz" \
            --endpoint https://oss-cn-shenzhen.aliyuncs.com --region cn-shenzhen --force
          scp -P "${{ secrets.TENCENT_PORT || '22' }}" deploy/docker-compose.prod.yml deploy/gateway-nginx.conf deploy/deploy-ops.sh \
            "${{ secrets.TENCENT_USER }}@${{ secrets.TENCENT_HOST }}:/tmp/"
          ssh -p "${{ secrets.TENCENT_PORT || '22' }}" "${{ secrets.TENCENT_USER }}@${{ secrets.TENCENT_HOST }}" \
            "sudo OSS_OBJECT_KEY='system-deploy/saydian-ai-os/${{ github.sha }}/saydian-ops-images.tar.gz' bash -lc 'set -euo pipefail; set -a; source /opt/saydian/env/production.env; set +a; ossutil cp \"oss://\$OSS_BUCKET/\$OSS_OBJECT_KEY\" /tmp/saydian-ops-images.tar.gz --endpoint \"\$OSS_ENDPOINT\" --region cn-shenzhen --force; install -m 644 /tmp/docker-compose.prod.yml /opt/saydian/config/docker-compose.prod.yml; install -m 644 /tmp/gateway-nginx.conf /opt/saydian/config/gateway-nginx.conf; install -m 755 /tmp/deploy-ops.sh /opt/saydian/bin/deploy-ops.sh; docker load -i /tmp/saydian-ops-images.tar.gz; rm -f /tmp/saydian-ops-images.tar.gz'"
      - name: Deploy and verify
        shell: bash
        run: |
          printf '%s' "${{ secrets.GITHUB_TOKEN }}" | ssh -p "${{ secrets.TENCENT_PORT || '22' }}" "${{ secrets.TENCENT_USER }}@${{ secrets.TENCENT_HOST }}" \
            "sudo docker login ghcr.io -u '${{ github.actor }}' --password-stdin"
          ssh -p "${{ secrets.TENCENT_PORT || '22' }}" "${{ secrets.TENCENT_USER }}@${{ secrets.TENCENT_HOST }}" \
            "sudo GHCR_REPOSITORY='${{ github.repository_owner }}/saydianaios' /opt/saydian/bin/deploy-ops.sh '${{ github.sha }}'"
