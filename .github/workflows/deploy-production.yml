name: test-build-deploy-production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  images:
    needs: verify
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/saydianaios/ops-api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/saydianaios/ops-api:latest
          cache-from: type=gha,scope=ops-api
          cache-to: type=gha,mode=max,scope=ops-api
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.admin
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/saydianaios/ops-admin:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/saydianaios/ops-admin:latest
          cache-from: type=gha,scope=ops-admin
          cache-to: type=gha,mode=max,scope=ops-admin

  deploy:
    needs: images
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure SSH
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.TENCENT_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.TENCENT_PORT || '22' }}" "${{ secrets.TENCENT_HOST }}" >> ~/.ssh/known_hosts
      - name: Upload deployment files
        shell: bash
        run: |
          mkdir -p release-images
          docker pull "ghcr.io/${{ github.repository_owner }}/saydianaios/ops-api:${{ github.sha }}"
          docker pull "ghcr.io/${{ github.repository_owner }}/saydianaios/ops-admin:${{ github.sha }}"
          docker save \
            "ghcr.io/${{ github.repository_owner }}/saydianaios/ops-api:${{ github.sha }}" \
            "ghcr.io/${{ github.repository_owner }}/saydianaios/ops-admin:${{ github.sha }}" \
            | gzip -1 > release-images/saydian-ops-images.tar.gz
          split -b 20m release-images/saydian-ops-images.tar.gz release-images/saydian-ops-images.part-
          rm release-images/saydian-ops-images.tar.gz
          scp -P "${{ secrets.TENCENT_PORT || '22' }}" deploy/docker-compose.prod.yml deploy/gateway-nginx.conf deploy/deploy-ops.sh \
            "${{ secrets.TENCENT_USER }}@${{ secrets.TENCENT_HOST }}:/tmp/"
          find release-images -maxdepth 1 -name 'saidian-ops-images.part-*' -print0 \
            | xargs -0 -P 8 -I {} scp -P "${{ secrets.TENCENT_PORT || '22' }}" "{}" "${{ secrets.TENCENT_USER }}@${{ secrets.TENCENT_HOST }}:/tmp/"
          ssh -p "${{ secrets.TENCENT_PORT || '22' }}" "${{ secrets.TENCENT_USER }}@${{ secrets.TENCENT_HOST }}" \
            "cat /tmp/saydian-ops-images.part-* > /tmp/saydian-ops-images.tar.gz && sudo install -m 644 /tmp/docker-compose.prod.yml /opt/saydian/config/docker-compose.prod.yml && sudo install -m 644 /tmp/gateway-nginx.conf /opt/saydian/config/gateway-nginx.conf && sudo install -m 755 /tmp/deploy-ops.sh /opt/saydian/bin/deploy-ops.sh && sudo docker load -i /tmp/saydian-ops-images.tar.gz && rm -f /tmp/saydian-ops-images.tar.gz /tmp/saydian-ops-images.part-*"
      - name: Deploy and verify
        shell: bash
        run: |
          printf '%s' "${{ secrets.GITHUB_TOKEN }}" | ssh -p "${{ secrets.TENCENT_PORT || '22' }}" "${{ secrets.TENCENT_USER }}@${{ secrets.TENCENT_HOST }}" \
            "sudo docker login ghcr.io -u '${{ github.actor }}' --password-stdin"
          ssh -p "${{ secrets.TENCENT_PORT || '22' }}" "${{ secrets.TENCENT_USER }}@${{ secrets.TENCENT_HOST }}" \
            "sudo GHCR_REPOSITORY='${{ github.repository_owner }}/saydianaios' /opt/saydian/bin/deploy-ops.sh '${{ github.sha }}'"
