services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: saidian_ops
      POSTGRES_USER: saidian_ops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - saidian_ops_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saidian_ops -d saidian_ops"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  saidian_ops_pg:

